<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>おこめ診断</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="hero">
      <p class="eyebrow">Okome Shindan</p>
      <h1>おこめ診断🌾</h1>
      <p class="lead">
        食感・甘み・食べ方の好みから、あなたに合いそうなおこめの銘柄をおすすめします。
      </p>
    </section>

    <form id="diagnosis-form" class="diagnosis-form" autocomplete="off">
      <div class="progress">
        <p id="question-count" class="question-count"></p>
        <div class="progress-track" aria-hidden="true">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
      </div>

      <section class="question-panel">
        <p id="question-category" class="eyebrow"></p>
        <h2 id="question-title"></h2>
        <div id="options" class="options"></div>
      </section>

      <div class="form-actions">
        <button type="button" class="secondary-button" id="back-button">前の質問へ</button>
      </div>
    </form>

    <section id="result" class="result hidden" aria-live="polite"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
